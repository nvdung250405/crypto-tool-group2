<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thuật toán DES – Ngô Văn Dũng</title>
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
    <script src="/js/script.js"></script>
</head>

<body class="d-flex">
    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <main class="main-content">
        <!-- Mobile Header -->
        <header class="mobile-header d-lg-none">
            <button class="btn btn-link text-dark p-0" onclick="toggleSidebar()">
                <i class="ti ti-menu-2 fs-1"></i>
            </button>
            <span class="fw-bold fs-3 text-dark">DES</span>
            <div style="width: 32px;"></div>
        </header>

        <div class="p-4 p-lg-5">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <span class="badge-custom mb-2 d-inline-block">Mật mã khối</span>
                    <h2 class="fw-bold mb-1">Thuật toán DES</h2>
                    <p class="text-muted mb-0">Data Encryption Standard - Phép biến đổi 16 vòng trên khối 64-bit.</p>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-xl-4 col-lg-5 col-12">
                    <div class="card card-crypto">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold mb-0">Cấu hình DES</h5>
                                <button type="button"
                                    class="btn btn-sm btn-link text-primary text-decoration-none fw-bold p-0"
                                    onclick="useSampleData()">
                                    <i class="ti ti-magic-wand me-1"></i>Dữ liệu mẫu
                                </button>
                            </div>

                            <form th:action="@{/des}" th:object="${request}" method="post">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Chức năng</label>
                                    <select class="form-select" th:field="*{opType}" id="inputOpType" onchange="updateFields()">
                                        <option value="FULL">Mã hóa / Giải mã toàn bộ</option>
                                        <option value="EXAM_FEISTEL">Giải bài tập Hàm Feistel DES</option>
                                    </select>
                                </div>

                                <div class="mb-3" id="groupData">
                                    <label class="form-label small fw-bold text-uppercase text-muted" id="labelData">Dữ liệu (Hex - 16 ký tự)</label>
                                    <input type="text" class="form-control font-monospace text-uppercase"
                                        th:field="*{data}" id="inputData" maxlength="16" placeholder="0123456789ABCDEF"
                                        required />
                                </div>
                                <div class="mb-3" id="groupKey">
                                    <label class="form-label small fw-bold text-uppercase text-muted" id="labelKey">Khóa (Hex - 16 ký tự)</label>
                                    <input type="text" class="form-control font-monospace text-uppercase"
                                        th:field="*{key}" id="inputKey" maxlength="16" placeholder="133457799BBCDFF1"
                                        required />
                                </div>

                                <div class="mb-3 d-none" id="groupRound">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Vòng lặp thứ (1 - 16)</label>
                                    <input type="number" class="form-control" th:field="*{roundNum}"
                                        id="inputRoundNum" min="1" max="16" value="1" required />
                                </div>

                                <div class="mb-4" id="groupMode">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Chế độ</label>
                                    <div class="btn-group w-100">
                                        <input type="radio" class="btn-check" th:field="*{mode}" value="encrypt"
                                            id="mode-enc" checked>
                                        <label class="btn btn-outline-primary" for="mode-enc">Mã hóa</label>
                                        <input type="radio" class="btn-check" th:field="*{mode}" value="decrypt"
                                            id="mode-dec">
                                        <label class="btn btn-outline-primary" for="mode-dec">Giải mã</label>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary-custom w-100 py-2">Thực thi</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-xl-8 col-lg-7">
                    <div th:if="${response != null}">
                        <div th:if="${response.errorMessage != null}"
                            class="alert alert-danger border-0 shadow-sm mb-4">
                            <i class="ti ti-alert-circle me-2"></i> <span th:text="${response.errorMessage}"></span>
                        </div>

                        <div th:if="${response.result != null}">
                            <div class="card card-crypto mb-4 border-primary">
                                <div class="card-body p-4">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span class="small fw-bold text-uppercase text-muted"
                                            th:text="${response.mode == 'encrypt' ? 'Kết quả Mã hóa (Hex)' : 'Kết quả Giải mã (Hex)'}"></span>
                                        <button class="btn btn-sm btn-outline-secondary rounded-pill"
                                            th:data-value="${response.result}"
                                            onclick="navigator.clipboard.writeText(this.dataset.value)">Sao
                                            chép</button>
                                    </div>
                                    <div class="fs-2 fw-bold font-monospace text-primary text-break"
                                        th:text="${response.result}"></div>
                                </div>
                            </div>

                            <div th:if="${not #lists.isEmpty(response.transcript)}">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="fw-bold mb-0 small text-uppercase text-muted">Chi tiết các bước thực hiện
                                    </h6>
                                    <button class="btn btn-sm btn-link text-primary text-decoration-none p-0"
                                        onclick="copyTranscript()">
                                        <i class="ti ti-copy me-1"></i>Sao chép các bước
                                    </button>
                                </div>
                                <div class="transcript-container" id="transcript-box">
                                    <div th:each="line : ${response.transcript}" th:text="${line}"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${response == null}" class="py-5 text-center text-muted">
                        <i class="ti ti-activity text-light mb-3 d-block" style="font-size: 3rem;"></i>
                        Nhập dữ liệu Hex và nhấn Thực thi để xem quy trình biến đổi của DES.
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function updateFields() {
            const opType = document.getElementById('inputOpType').value;
            const groupData = document.getElementById('groupData');
            const groupKey = document.getElementById('groupKey');
            const groupMode = document.getElementById('groupMode');
            const groupRound = document.getElementById('groupRound');

            const labelData = document.getElementById('labelData');
            const labelKey = document.getElementById('labelKey');
            const inputData = document.getElementById('inputData');
            const inputKey = document.getElementById('inputKey');

            if (opType === 'FULL') {
                groupData.classList.remove('d-none');
                groupKey.classList.remove('d-none');
                groupMode.classList.remove('d-none');
                groupRound.classList.add('d-none');
                inputData.maxLength = 16;
                inputKey.maxLength = 16;
                labelData.innerText = "Dữ liệu (Hex - 16 ký tự)";
                labelKey.innerText = "Khóa (Hex - 16 ký tự)";
            } else if (opType === 'EXAM_FEISTEL') {
                groupData.classList.remove('d-none');
                groupKey.classList.remove('d-none');
                groupMode.classList.add('d-none');
                groupRound.classList.remove('d-none');
                inputData.maxLength = 8;
                inputKey.maxLength = 12;
                labelData.innerText = "Nửa phải R_{i-1} (Hex - 8 ký tự)";
                labelKey.innerText = "Khóa vòng K_i (Hex - 12 ký tự)";
            }
        }

        function useSampleData() {
            const opType = document.getElementById('inputOpType').value;
            if (opType === 'FULL') {
                document.getElementById('inputData').value = 'E36B4C92DE9AD726';
                document.getElementById('inputKey').value = '17FFCC5ADBF3EA87';
                document.getElementById('mode-enc').checked = true;
            } else if (opType === 'EXAM_FEISTEL') {
                document.getElementById('inputData').value = 'C11BFC09';
                document.getElementById('inputKey').value = '710DEAA3202B';
                document.getElementById('inputRoundNum').value = '1';
            }
        }

        function copyTranscript() {
            const box = document.getElementById('transcript-box');
            if (box) {
                const text = box.innerText;
                navigator.clipboard.writeText(text);
                alert('Đã sao chép các bước thực hiện!');
            }
        }

        window.onload = function() {
            updateFields();
        };
    </script>
</body>

</html>
